<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Business Card -->
  <g transform="translate(256,240) rotate(-10)">
    <rect x="-110" y="-70" width="220" height="140" rx="16" fill="white"/>
    <!-- Card lines -->
    <rect x="-80" y="-40" width="90" height="12" rx="6" fill="#1e3a8a" opacity="0.7"/>
    <rect x="-80" y="-18" width="60" height="8" rx="4" fill="#0d9488" opacity="0.5"/>
    <rect x="-80" y="2" width="110" height="8" rx="4" fill="#1e3a8a" opacity="0.25"/>
    <rect x="-80" y="22" width="80" height="8" rx="4" fill="#1e3a8a" opacity="0.25"/>
    <!-- Avatar placeholder -->
    <circle cx="60" cy="-10" r="32" fill="#e2e8f0"/>
  </g>

  <!-- Scan lines -->
  <g stroke="white" stroke-width="10" stroke-linecap="round">
    <line x1="120" y1="400" x2="300" y2="220" opacity="0.7"/>
    <line x1="160" y1="430" x2="340" y2="250" opacity="0.4"/>
    <line x1="200" y1="460" x2="380" y2="280" opacity="0.2"/>
  </g>

  <!-- Checkmark badge -->
  <circle cx="400" cy="400" r="48" fill="white"/>
  <path d="M375 400 L390 415 L425 375" fill="none" stroke="#0d9488" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
