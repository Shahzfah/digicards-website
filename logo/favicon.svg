      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#favBg)"/>

  <!-- Simplified card -->
